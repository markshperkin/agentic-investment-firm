name: CI

on:
  push:
    branches: [main, "build/**"]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests (offline, cassette LLM, deterministic)
        env:
          LLM_MODE: cassette
        run: python -m pytest -q
      - name: Eval harness (golden + red-team, zero tokens)
        env:
          LLM_MODE: cassette
        run: python -m eval.harness

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
